name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Run linter
        run: htmlhint "*.html" --rules tagname-lowercase=true,attr-lowercase=true,attr-value-double-quotes=true,doctype-first=false

  build:
    runs-on: ubuntu-latest
    needs: linter

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-site .

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR using PAT
        run: echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u leraddrv --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/leraddrv/my-site:latest .

      - name: Push image
        run: docker push ghcr.io/leraddrv/my-site:latest